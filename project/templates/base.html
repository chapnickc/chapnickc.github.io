<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>{% block page_title %}chapnickc.github.io{% endblock %}</title>

  <!-- Fetch Bootstrap, Fonts, style.css -->
    <link rel='stylesheet prefetch' href='https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css'>
    <link rel='stylesheet prefetch' href='https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css'>
    <link rel='stylesheet' href="https://fonts.googleapis.com/css?family=Alegreya+Sans+SC"> 
    <link rel='stylesheet' type='text/css' href='https://fonts.googleapis.com/css?family=Quattrocento+Sans:400,700,400italic|Montserrat:400,700|Cardo:400italic|Advent+Pro:100'> 
    <link rel='stylesheet' href='{{ url_for('static',filename='css/style.css') }}'>

  <!-- MathJax Config -->
    <script src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML" type="text/javascript"></script>
    <script type="text/x-mathjax-config">MathJax.Hub.Config({
    extensions: ["tex2jax.js"],
    jax: ["input/TeX", "output/HTML-CSS"],
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      displayMath: [ ['$$','$$'], ["\\[","\\]"] ],
      processEscapes: true}, 
    "HTML-CSS": { availableFonts: ["TeX"] }});
    </script>

    <!-- script.js -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

  <!-- Javascript -->

    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery.actual/1.0.17/jquery.actual.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery-scrollTo/2.1.1/jquery.scrollTo.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js'></script>
    <script src='https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/js/bootstrap.min.js'></script>

  <!-- Google Analytics -->
    <script>
    (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
      (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
      m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
    })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');
    ga('create', 'UA-92051034-1', 'auto');
    ga('send', 'pageview');
    </script>

    <!-- script.js -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>

<body>
  <!-- NAVIGATION -->
  <nav class="navbar navbar-default navbar-fixed-top" role="navigation">
    <div class="container">
      <div class="navbar-header">
        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand scroll" href="{{ url_for('home') }}">Chad Chapnick</a>
      </div>

      <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
        <ul class="nav navbar-nav">
          <li><a href="{{url_for('home')}}/#home" {% if active is defined %}class="scroll"{% endif %}>HOME</a></li>
          <li><a href="{{ url_for('home')  }}/#about" {% if active is defined %}class="scroll"{% endif %}>ABOUT</a></li>
          <li><a href="{{ url_for('home')  }}/#portfolio" {% if active is defined %}class="scroll"{% endif %}>PORTFOLIO</a></li>
          <li><a href="{{ url_for('home')  }}/#contact" {% if active is defined %}class="scroll"{% endif %}>CONTACT</a></li>
          <li><a href="{{ url_for('resume') }}" >RESUME</a></li>
        </ul>
      </div>
    </div> <!-- end container -->
  </nav>

  <!-- BLOCK CONTENT -->
  <div class="{% block content_class %}container-section{% endblock content_class %}">
    <div class="content" role="main">{% block content %}{% endblock %}</div>
  </div><!-- end container -->
</body>
</html>
